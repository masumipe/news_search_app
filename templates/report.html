<!DOCTYPE html>
<html>
<head>
    <title>Report</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .report { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 5px; }
        h2 { color: #333; }
        a { color: #4CAF50; }
        .meta { color: #777; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Report #{{ report.id }}</h1>
        {% if report %}
        <div class="report">
            <p class="meta">Topic: {{ report.topic }}</p>
            <p class="meta">Region: {{ report.region }}</p>
            <h2>Financial Analysis</h2>
            <p>{{ report.financial_analysis }}</p>
            <h2>Images</h2>
            <p>{{ report.images }}</p>
            <h2>Tables</h2>
            <p>{{ report.tables }}</p>
        </div>
        {% else %}
        <p>Report not found.</p>
        {% endif %}
        <a href="/">Back to Home</a>
    </div>
</body>
</html>
